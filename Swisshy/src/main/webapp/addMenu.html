<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ForkDash — Add Menu Item</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --card: #1c1c1c;
      --border: #2a2a2a; --accent: #ff5c2b;
      --text: #f0ede8; --muted: #888; --nav-h: 70px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: rgba(13,13,13,0.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.55rem; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-links a { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 50px; color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: background 0.2s, color 0.2s; }
    .nav-links a:hover { background: var(--surface); color: var(--text); }
    .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: calc(var(--nav-h) + 40px) 20px 40px; }
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 44px; width: 100%; max-width: 600px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .form-eyebrow { font-size: 0.78rem; font-weight: 600; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
    .form-heading { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
    .form-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    .field input, .field textarea, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select option { background: var(--surface); }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,92,43,0.12); }
    .field input::placeholder, .field textarea::placeholder { color: #555; }
    .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px; }
    .btn-primary:hover { background: #e04d22; }
    .btn-primary:active { transform: scale(0.98); }
    .msg-bar { padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 0.88rem; font-weight: 500; display: none; }
    .msg-bar.success { background: rgba(76,175,80,0.1); border: 1px solid #4caf50; color: #4caf50; display: block; }
    .msg-bar.error   { background: rgba(255,77,77,0.1); border: 1px solid #ff4d4d; color: #ff4d4d; display: block; }
    @media (max-width: 600px) { .form-card { padding: 32px 20px; } .fields-grid { grid-template-columns: 1fr; } nav { padding: 0 16px; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.jsp">Fork<span>Dash</span></a>
  <div class="nav-links">
    <a href="restaurant">View Restaurants</a>
    <a href="addRestaurant.html">Add Restaurant</a>
    <a href="logout">Logout</a>
  </div>
</nav>
<div class="page">
  <div class="form-card">
    <div class="form-eyebrow">Admin Panel</div>
    <h1 class="form-heading">Add Menu Item</h1>
    <p class="form-sub">Add a new item to a restaurant's menu.</p>
    <div id="msgBar" class="msg-bar"></div>

    <!-- ✅ action="menu" matches @WebServlet("/menu") -->
    <form method="post" action="menu">
      <div class="field">
        <label>Restaurant Name</label>
        <input type="text" name="restaurant" placeholder="e.g. Pizza Republik" required/>
      </div>
      <div class="field">
        <label>Item Name</label>
        <!-- ✅ name="item_name" matches MenuServlet getParameter("item_name") -->
        <input type="text" name="item_name" placeholder="e.g. Margherita Pizza" required/>
      </div>
      <div class="fields-grid">
        <div class="field">
          <label>Price (&#8377;)</label>
          <input type="number" step="0.01" name="price" placeholder="e.g. 299.00" required/>
        </div>
        <div class="field">
          <label>Category</label>
          <select name="category">
            <option value="Starter">Starter</option>
            <option value="Main Course">Main Course</option>
            <option value="Dessert">Dessert</option>
            <option value="Drinks">Drinks</option>
            <option value="Sides">Sides</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Snacks">Snacks</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea name="description" placeholder="Describe the item..."></textarea>
      </div>
      <button type="submit" class="btn-primary">Add Menu Item &#8594;</button>
    </form>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const status = params.get('status');
const bar = document.getElementById('msgBar');
if (status === 'success') {
  bar.className = 'msg-bar success';
  bar.textContent = '🎉 Menu item added successfully!';
} else if (status === 'failed') {
  bar.className = 'msg-bar error';
  bar.textContent = '❌ Failed to add item. Please try again.';
}
if (status) window.history.replaceState({}, document.title, 'addMenu.html');
</script>
</body>
</html>
